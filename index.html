<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>不動産案件管理システム導入のご提案</title>
    
    <!-- ファビコン（🐢） -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%2770%27 font-size=%2770%27%3E%F0%9F%90%A2%3C/text%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        #pdf-canvas {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const url = 'document1.pdf';

        async function renderPDF() {
            const pdf = await pdfjsLib.getDocument(url).promise;
            const page = await pdf.getPage(1); // 1ページ目をレンダリング（必要に応じてループ可）
            
            const canvas = document.getElementById('pdf-canvas');
            const context = canvas.getContext('2d');
            
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
        }

        renderPDF();
    </script>
</body>
</html>
