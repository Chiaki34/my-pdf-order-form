<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>不動産案件管理システム導入のご提案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch; /* スマホのスクロールを滑らかに */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* スマホ向け調整 */
        @media (max-width: 768px) {
            .pdf-container {
                height: 100vh;
            }
            iframe {
                min-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe src="document1.pdf" type="application/pdf"></iframe>
    </div>
</body>
</html>
