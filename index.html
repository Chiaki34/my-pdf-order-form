<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>不動産案件管理システム導入のご提案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* スマホ向け：PDFを画面幅に強制フィット */
        @media (max-width: 768px) {
            .pdf-container {
                overflow-x: hidden;           /* 横スクロール禁止 */
            }
            iframe {
                width: 100% !important;
                min-width: 100% !important;
                max-width: 100% !important;
                height: 100%;
            }
        }

        /* PC向け：画面いっぱい */
        @media (min-width: 769px) {
            iframe {
                width: 100%;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe src="document1.pdf" type="application/pdf"></iframe>
    </div>
</body>
</html>
