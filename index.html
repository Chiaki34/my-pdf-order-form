<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>不動産案件管理システム導入のご提案</title>
    
    <!-- ファビコン（🐢） -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%2770%27 font-size=%2770%27%3E%F0%9F%90%A2%3C/text%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .pdf-container {
            width: 100%;
            height: 100vh;
            overflow-x: hidden;        /* 横スクロール完全禁止 */
            overflow-y: auto;          /* 上下のみ */
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;       /* 上下スクロールのみ */
        }
        embed {
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            min-height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <embed src="document1.pdf" type="application/pdf">
    </div>
</body>
</html>
